<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Critical for mobile rendering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>RAID: Shadow Legends</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- CTA lives in DOM for accessibility and easy styling -->
      <button id="cta" type="button" hidden>DOWNLOAD</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  <script>
    function scaleApp() {
      const app = document.getElementById('app')
      const scaleX = window.innerWidth / 375
      const scaleY = window.innerHeight / 812
      const scale = Math.min(scaleX, scaleY) * 0.97  // ← 3% buffer for browser chrome
      const scaledW = 375 * scale
      const scaledH = 812 * scale
      const offsetX = (window.innerWidth - scaledW) / 2
      const offsetY = (window.innerHeight - scaledH) / 2
      app.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`
      app.style.transformOrigin = 'top left'
    }
    scaleApp()
    window.addEventListener('resize', scaleApp)
  </script>
</html>
